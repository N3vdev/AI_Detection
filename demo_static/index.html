<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI Product Inspector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0c0c;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
    }

    /* ── Photo strip ── */
    .strip-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }
    .strip-label {
      font-size: 0.72rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .strip::-webkit-scrollbar { display: none; }

    /* each thumbnail slot */
    .thumb {
      position: relative;
      flex-shrink: 0;
      width: 100px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      background: #171717;
      border: 1px solid #222;
    }
    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .thumb-remove {
      position: absolute;
      top: 5px; right: 5px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* "+" add button (last slot in strip) */
    .add-slot {
      flex-shrink: 0;
      width: 100px;
      height: 120px;
      border-radius: 12px;
      background: #111;
      border: 2px dashed #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .add-slot:active { border-color: #444; }
    .add-slot .plus { font-size: 1.8rem; color: #444; line-height: 1; }
    .add-slot .add-hint { font-size: 0.7rem; color: #444; text-align: center; line-height: 1.3; }

    /* empty state (no photos yet) */
    .empty-area {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3/4;
      background: #111;
      border: 2px dashed #222;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .empty-area:active { border-color: #444; }
    .empty-icon { font-size: 3rem; }
    .empty-hint { font-size: 0.88rem; color: #555; }
    .empty-sub  { font-size: 0.75rem; color: #3a3a3a; }

    input[type="file"] { display: none; }

    /* ── Scan button ── */
    .btn-scan {
      width: 100%;
      max-width: 420px;
      padding: 17px;
      font-size: 1rem;
      font-weight: 700;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-scan:active  { background: #16a34a; }
    .btn-scan:disabled { opacity: 0.3; cursor: not-allowed; background: #22c55e; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 28px;
    }
    .spinner.show { display: flex; }
    .spin-ring {
      width: 44px; height: 44px;
      border: 3px solid #222;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-label { font-size: 0.82rem; color: #555; }

    /* ── Result card ── */
    .result {
      display: none;
      width: 100%;
      max-width: 420px;
      background: #131313;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 20px;
      margin-top: 24px;
    }
    .result.show { display: block; }

    .result-top {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
      gap: 10px;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .badge-barcode { background: #0ea5e9; color: #000; }
    .badge-ai      { background: #a855f7; color: #fff; }
    .result-ms { margin-left: auto; font-size: 0.72rem; color: #444; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 11px 0;
      border-bottom: 1px solid #1c1c1c;
      gap: 16px;
    }
    .row:last-child { border-bottom: none; padding-bottom: 0; }
    .row-label {
      font-size: 0.72rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .row-value { font-size: 0.9rem; color: #e0e0e0; text-align: right; word-break: break-word; }
    .row-value.primary { color: #22c55e; font-size: 1.05rem; font-weight: 700; }

    /* ── Error ── */
    .error {
      display: none;
      width: 100%;
      max-width: 420px;
      background: #1c0a0a;
      border: 1px solid #5c1a1a;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.84rem;
      color: #f87171;
      margin-top: 20px;
    }
    .error.show { display: block; }

    /* ── New scan ── */
    .btn-new {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      background: transparent;
      color: #666;
      border: 1px solid #222;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 12px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-new.show { display: block; }
    .btn-new:active { border-color: #555; color: #ccc; }
  </style>
</head>
<body>

  <!-- Empty state (shown when no photos) -->
  <div class="empty-area" id="emptyArea" onclick="document.getElementById('fileInput').click()">
    <div class="empty-icon">📷</div>
    <div class="empty-hint">Tap to add photos</div>
    <div class="empty-sub">Front · Back · Side</div>
  </div>

  <!-- Thumbnail strip (shown when ≥1 photo) -->
  <div class="strip-wrap" id="stripWrap" style="display:none">
    <div class="strip-label" id="stripLabel">1 photo</div>
    <div class="strip" id="strip">
      <!-- thumbs injected here -->
      <div class="add-slot" id="addSlot" onclick="document.getElementById('fileInput').click()">
        <div class="plus">+</div>
        <div class="add-hint">Add<br>photo</div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple>

  <button class="btn-scan" id="btnScan" disabled onclick="scan()">Scan Product</button>

  <div class="spinner" id="spinner">
    <div class="spin-ring"></div>
    <div class="spin-label" id="spinLabel">Analysing product…</div>
  </div>

  <div class="result" id="result">
    <div class="result-top">
      <span class="badge" id="badge"></span>
      <span class="result-ms" id="resultMs"></span>
    </div>
    <div id="rows"></div>
  </div>

  <div class="error" id="error"></div>
  <button class="btn-new" id="btnNew" onclick="resetAll()">Scan Another Product</button>

<script>
  const MAX_PHOTOS = 6;
  let photos = []; // { file, url }

  const fileInput  = document.getElementById('fileInput');
  const emptyArea  = document.getElementById('emptyArea');
  const stripWrap  = document.getElementById('stripWrap');
  const stripEl    = document.getElementById('strip');
  const addSlot    = document.getElementById('addSlot');
  const stripLabel = document.getElementById('stripLabel');
  const btnScan    = document.getElementById('btnScan');
  const spinner    = document.getElementById('spinner');
  const spinLabel  = document.getElementById('spinLabel');
  const resultEl   = document.getElementById('result');
  const errorEl    = document.getElementById('error');
  const btnNew     = document.getElementById('btnNew');

  fileInput.addEventListener('change', () => {
    for (const file of fileInput.files) {
      if (photos.length >= MAX_PHOTOS) break;
      photos.push({ file, url: URL.createObjectURL(file) });
    }
    fileInput.value = '';
    renderStrip();
  });

  function renderStrip() {
    // Toggle empty vs strip
    emptyArea.style.display = photos.length === 0 ? 'flex' : 'none';
    stripWrap.style.display = photos.length === 0 ? 'none' : 'block';

    // Rebuild thumbnails (keep addSlot at the end)
    while (stripEl.firstChild && stripEl.firstChild !== addSlot) {
      stripEl.removeChild(stripEl.firstChild);
    }

    photos.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `
        <img src="${p.url}" alt="photo ${i+1}">
        <button class="thumb-remove" onclick="removePhoto(${i})">✕</button>
      `;
      stripEl.insertBefore(div, addSlot);
    });

    // Hide add slot when at max
    addSlot.style.display = photos.length >= MAX_PHOTOS ? 'none' : 'flex';

    // Update label
    stripLabel.textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;

    btnScan.disabled = photos.length === 0;
    resultEl.classList.remove('show');
    errorEl.classList.remove('show');
    btnNew.classList.remove('show');
  }

  function removePhoto(index) {
    URL.revokeObjectURL(photos[index].url);
    photos.splice(index, 1);
    renderStrip();
  }

  async function scan() {
    if (photos.length === 0) return;

    btnScan.disabled = true;
    spinner.classList.add('show');
    spinLabel.textContent = 'Analysing product…';
    resultEl.classList.remove('show');
    errorEl.classList.remove('show');
    btnNew.classList.remove('show');

    const labels = ['Scanning for barcode…', 'Running AI vision…', 'Extracting details…'];
    let li = 0;
    const cycle = setInterval(() => {
      li = (li + 1) % labels.length;
      spinLabel.textContent = labels[li];
    }, 1800);

    const form = new FormData();
    photos.forEach(p => form.append('images', p.file));

    try {
      const res = await fetch('/inspect', { method: 'POST', body: form });
      clearInterval(cycle);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `Server error ${res.status}`);
      }
      showResult(await res.json());
    } catch (e) {
      clearInterval(cycle);
      errorEl.textContent = `Error: ${e.message}`;
      errorEl.classList.add('show');
      btnScan.disabled = false;
    } finally {
      spinner.classList.remove('show');
    }
  }

  function showResult(data) {
    const badge    = document.getElementById('badge');
    const resultMs = document.getElementById('resultMs');
    const rows     = document.getElementById('rows');
    rows.innerHTML = '';

    if (data.barcode) {
      badge.textContent = 'Barcode';
      badge.className = 'badge badge-barcode';
      addRow(rows, 'Value', data.barcode, true);
    } else {
      badge.textContent = 'AI Scan';
      badge.className = 'badge badge-ai';
      if (data.brand)            addRow(rows, 'Brand',    data.brand, true);
      if (data.product_name)     addRow(rows, 'Product',  data.product_name);
      if (data.product_category) addRow(rows, 'Category', data.product_category);
      if (data.expiry_date)      addRow(rows, 'Expiry',   data.expiry_date);
      if (data.manufacture_date) addRow(rows, 'MFG Date', data.manufacture_date);
      if (data.batch_number)     addRow(rows, 'Batch',    data.batch_number);
      if (!data.brand && !data.product_name)
        addRow(rows, 'Status', data.status || 'Could not extract details');
    }

    if (data.processing_ms)
      resultMs.textContent = `${(data.processing_ms / 1000).toFixed(1)}s`;

    resultEl.classList.add('show');
    btnNew.classList.add('show');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function addRow(container, label, value, primary = false) {
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <span class="row-label">${label}</span>
      <span class="row-value${primary ? ' primary' : ''}">${value}</span>
    `;
    container.appendChild(div);
  }

  function resetAll() {
    photos.forEach(p => URL.revokeObjectURL(p.url));
    photos = [];
    renderStrip();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

</script>

</body>
</html>
